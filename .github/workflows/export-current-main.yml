name: Export Current Main

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-20-two-layer-branch-trial'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1
      - name: Record current main revision
        run: |
          git rev-parse HEAD > /tmp/current-main-sha.txt
          git rev-parse HEAD^{tree} > /tmp/current-main-tree.txt
      - name: Package current main
        run: tar --exclude=.git -czf /tmp/current-main.tar.gz .
      - uses: actions/upload-artifact@v7
        with:
          name: current-main-snapshot
          path: |
            /tmp/current-main.tar.gz
            /tmp/current-main-sha.txt
            /tmp/current-main-tree.txt
          archive: false
          retention-days: 1
