name: Governance

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Install pre-commit for PR validation
        run: pip install pre-commit==4.6.0
      - name: Validate pre-commit configuration
        run: pre-commit validate-config
      - name: Execute pre-commit hooks
        id: precommit
        shell: bash
        run: |
          set +e
          pre-commit run --all-files --show-diff-on-failure > pre-commit.log 2>&1
          status=$?
          cat pre-commit.log
          exit "$status"
      - name: Upload pre-commit log on failure
        if: failure() && steps.precommit.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pre-commit-log
          path: pre-commit.log
          archive: false
          retention-days: 3
      - run: python tools/devflow.py catalog --check
      - run: python .agents/skills/maintain-canonical-requirements/scripts/specflow.py check
      - run: python .agents/skills/verify-against-engineering-standards/scripts/standardsflow.py check
      - run: ruff check .
      - name: Validate adaptive review contract
        run: python governance/reviews/validate.py --root . --commit HEAD
      - name: Run unit tests
        id: unit-tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests > unit-test.log 2>&1
          status=$?
          cat unit-test.log
          exit "$status"
      - name: Upload unit test log on failure
        if: failure() && steps.unit-tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          path: unit-test.log
          archive: false
          retention-days: 3
      - name: Run repository validation
        id: repository-validation
        if: always()
        shell: bash
        run: |
          set +e
          python tools/validate_repo.py > repository-validation.log 2>&1
          status=$?
          cat repository-validation.log
          exit "$status"
      - name: Upload repository validation log on failure
        if: failure() && steps.repository-validation.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          path: repository-validation.log
          archive: false
          retention-days: 3
      - name: Run regulated audit
        if: success()
        run: python tools/devflow.py audit
