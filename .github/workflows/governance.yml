name: Governance

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  issues: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Create repository snapshot
        shell: bash
        run: tar --exclude=.git -czf /tmp/repository-snapshot.tar.gz .
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v7
        with:
          name: repository-snapshot
          path: /tmp/repository-snapshot.tar.gz
          archive: false
          retention-days: 1
      - name: Export canonical issue context
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repository = "tsuji-tomonori/dev-standard"
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "dev-standard-issue-export",
          }

          def get(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          context = {}
          for number in (13, 14, 15, 16, 19, 20, 22):
              base = f"https://api.github.com/repos/{repository}/issues/{number}"
              context[str(number)] = {
                  "issue": get(base),
                  "comments": get(base + "/comments?per_page=100"),
              }
          with open("/tmp/issue-context.json", "w", encoding="utf-8") as stream:
              json.dump(context, stream, ensure_ascii=False, indent=2)
              stream.write("\n")
          PY
      - name: Upload canonical issue context
        uses: actions/upload-artifact@v7
        with:
          name: issue-context
          path: /tmp/issue-context.json
          archive: false
          retention-days: 1
      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Validate pre-commit configuration
        run: pre-commit validate-config
      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure
      - run: python tools/devflow.py catalog --check
      - run: python .agents/skills/maintain-canonical-requirements/scripts/specflow.py check
      - run: python .agents/skills/verify-against-engineering-standards/scripts/standardsflow.py check
      - run: ruff check .
      - name: Validate adaptive review contract
        run: python governance/reviews/validate.py --root . --commit HEAD
      - name: Run unit tests
        id: unit-tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests > unit-test.log 2>&1
          status=$?
          cat unit-test.log
          exit "$status"
      - name: Upload unit test log on failure
        if: failure() && steps.unit-tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          path: unit-test.log
          archive: false
          retention-days: 3
      - name: Run repository validation
        id: repository-validation
        if: always()
        shell: bash
        run: |
          set +e
          python tools/validate_repo.py > repository-validation.log 2>&1
          status=$?
          cat repository-validation.log
          exit "$status"
      - name: Upload repository validation log on failure
        if: failure() && steps.repository-validation.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          path: repository-validation.log
          archive: false
          retention-days: 3
      - name: Run regulated audit
        if: success()
        run: python tools/devflow.py audit
