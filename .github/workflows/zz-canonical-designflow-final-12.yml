name: Canonical Designflow Final SHA Attestation

on:
  push:
    branches: [agent/canonical-design-platform]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  actions: read

concurrency:
  group: canonical-designflow-final-sha-attestation
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/canonical-design-platform
          fetch-depth: 0
      - name: Wait for the semantic finalizer and read its final SHA
        shell: bash
        run: |
          sleep 900
          git fetch origin main agent/canonical-design-platform --no-tags
          git reset --hard origin/agent/canonical-design-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install -r requirements.txt
          pip install "fastapi>=0.115,<1"
      - name: Assert final branch structure and semantic hardening
        shell: bash
        run: |
          test "$(git rev-list --count origin/main..HEAD)" -eq 1
          test ! -d .github/bootstrap
          test ! -e .canonical-final-tree
          ! find .github/workflows -maxdepth 1 -type f \( -name 'canonical-designflow-repair*' -o -name 'zz-canonical-designflow-final*' \) | grep .
          test -f tools/designflow_platform.py
          test -f tests/test_designflow_platform.py
          test -f spec/design-ir/canonical-design-ir.schema.json
          test -f spec/design-ir/profiles/backend.schema.json
          test -f spec/design-ir/profiles/frontend.schema.json
          test -f spec/design-ir/profiles/infrastructure.schema.json
          test -f spec/design-ir/profiles/batch.schema.json
          test -f spec/design-ir/adapter-protocol.schema.json
          test -f spec/design-ir/adapter-manifest.schema.json
          test -f spec/design-ir/support-registry.schema.json
          test -f governance/design-adapters/support-registry.json
          test -f spec/design-ir/traceability.json
          test -f docs/decisions/DR-20260724-designflow-phase1-exit.md
          test -f .agents/skills/adopt-implementation-design/SKILL.md
          test -f .agents/skills/generate-implementation-design/templates/project-local-adapter/adapter-manifest.json
          test -f .github/workflows/designflow-conformance.yml
          grep -q 'SENSITIVE_KEY_PATTERN' tools/designflow_platform.py
          grep -q 'REQUIRED_CAPABILITY_NOT_APPLICABLE' tools/designflow_platform.py
          grep -q 'SYSTEM_LINK_CONFLICT' tools/designflow_platform.py
          grep -q 'infra.stack' tools/designflow_platform.py
          grep -q 'requirements-designflow.txt' tools/adopt_implementation_design.py
          for view in STACKS RESOURCES PARAMETERS DEPENDENCIES IAM NETWORK STATEFUL_RESOURCES EXTERNAL_REFERENCES CHANGE_RISKS; do
            test -f "tests/fixtures/designflow/profiles/infrastructure/docs/design/generated/infra/${view}.gen.md"
          done
          for view in API_CATALOG INTERFACES OPERATIONS SEQUENCES DATA_MODEL CRUD QUERY_OBJECTS TEST_SCENARIOS; do
            test -f "tests/fixtures/designflow/phase1/docs/design/generated/orders-backend/${view}.gen.md"
          done
          for view in IMPLEMENTATION VERIFICATION_MAP; do
            test -f "tests/fixtures/designflow/profiles/frontend/docs/design/generated/web/${view}.gen.md"
          done
          for view in BATCH_CATALOG JOBS FLOWS EFFECTS RECOVERY VERIFICATION_MAP; do
            test -f "tests/fixtures/designflow/profiles/batch/docs/design/generated/nightly/${view}.gen.md"
          done
      - name: Run complete repository and real-toolchain certification
        shell: bash
        run: |
          set -o pipefail
          python tools/devflow.py catalog --check
          python .agents/skills/maintain-canonical-requirements/scripts/specflow.py check
          python .agents/skills/verify-against-engineering-standards/scripts/standardsflow.py check
          ruff check .
          python governance/reviews/validate.py --root . --commit HEAD
          python .agents/skills/generate-implementation-design/scripts/designflow.py --root . conformance --real-toolchain --json
          python -m unittest discover -s tests
          python tools/validate_repo.py
          python tools/devflow.py audit
          test -z "$(git status --porcelain)"
      - id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  matrix:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        timezone: ["UTC", "Asia/Tokyo"]
    env:
      TZ: ${{ matrix.timezone }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify.outputs.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install "fastapi>=0.115,<1"
      - run: python .agents/skills/generate-implementation-design/scripts/designflow.py --root . conformance --real-toolchain --json
      - run: python -m unittest discover -s tests -p 'test_designflow_platform.py'

  secret-scan:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify.outputs.sha }}
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attest:
    needs: [verify, matrix, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = 30;
            const sha = '${{ needs.verify.outputs.sha }}';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const rows = [
              ['1', 'Versioned core/profile/protocol/manifest/registry/config/bundle schemas', '`spec/design-ir/**`; schema and runtime contract tests'],
              ['2', 'Shared core, runner, sandbox, merge, identity, diagnostics, capability, serialization, redaction', '`tools/designflow_platform.py`; security and contract tests'],
              ['3', 'Canonical CLI plus legacy compatibility', '`discover/generate/check/explain/describe-capabilities/conformance/migrate`; legacy wrapper tests'],
              ['4', 'Requirement/test/external evidence in IR; renderer isolation', 'trace-map tests; IR-only Markdown and graph-only Mermaid tests'],
              ['5', 'Determinism and fail-closed mutation/environment/drift behavior', 'byte determinism, semantic mutation, environment matrix, non-overwriting drift tests'],
              ['6', 'Stable identity, explicit migration/supersede, orphan handling', 'identity and orphan-trace tests'],
              ['7', 'Explicit migration; no silent legacy overwrite', '`migrate --check/--apply` tests'],
              ['8', 'Committed baselines and five-framework positive/negative corpus', 'FastAPI/OpenAPI/SQL and CloudFormation baselines; FastAPI/Spring/Rails/NestJS/Gin corpus'],
              ['9', 'Phase 1 FastAPI + OpenAPI + DDL/raw SQL vertical slice', 'merged IR, evidence authority, parity, bytes, drift, negative tests'],
              ['10', 'Second extraction model without framework branching in core', 'CloudFormation build artifact and core-source boundary test'],
              ['11', 'Nine-layer conformance and support-promotion gate', '`run_conformance`; positive fixture cannot promote support'],
              ['12', 'Security negative corpus before persistence', 'secret log/fragment/key, path escape, timeout, resource, credential-scrub tests'],
              ['13', 'Cross-artifact requirement/check/evidence trace consistency', '`spec/design-ir/traceability.json`; canonical requirement and unique FAST-ID tests'],
              ['14', 'Safe adoption Skill and synthetic consumer CI', '`adopt-implementation-design`; dry-run/apply/no-overwrite plus generated consumer execution'],
              ['15', 'Project-local adapter template without false support claims', 'candidate manifest, entrypoint, positive/negative fixtures'],
              ['16', 'Multi-project/multi-profile system IR and explicit orphan/conflict diagnostics', 'system fixture and exact-link tests'],
              ['17', '#22 shared conformance API boundary', '`docs/reference/designflow-conformance-api.md`'],
              ['18', 'Measured Phase 1 exit decision and Phase 2 gate', '`docs/decisions/DR-20260724-designflow-phase1-exit.md`'],
            ];
            const table = ['| AC | Verified contract | Evidence |', '|---:|---|---|', ...rows.map(row => `| ${row[0]} | ${row[1]} | ${row[2]} |`)].join('\n');
            const marker = '<!-- canonical-designflow-final-sha-attestation -->';
            const certification = `${marker}\n## Final SHA certification: PASS\n\n` +
              `Certified SHA: \`${sha}\`  \n` +
              `Attestation run: ${runUrl}\n\n` +
              `${table}\n\n` +
              `### Executed gates\n\n` +
              `- repository catalog, canonical requirements, engineering standards, adaptive review, full unit suite, repository validation, and regulated audit: PASS\n` +
              `- all nine conformance layers with the real FastAPI toolchain: PASS\n` +
              `- Python 3.11 / 3.12 / 3.13 × UTC / Asia/Tokyo: PASS\n` +
              `- gitleaks: PASS\n` +
              `- one commit over main; no bootstrap/finalizer artifacts; clean post-validation tree: PASS\n\n` +
              `No adapter is promoted from fixture success alone. Support remains candidate/experimental until immutable real-toolchain promotion evidence is recorded.`;

            await github.rest.checks.create({
              owner,
              repo,
              name: 'Canonical Designflow Final Acceptance',
              head_sha: sha,
              status: 'completed',
              conclusion: 'success',
              details_url: runUrl,
              output: {
                title: 'All 18 acceptance criteria certified',
                summary: `Repository, conformance, six-environment matrix, and secret gates passed for ${sha}.`,
                text: certification,
              },
            });

            async function upsertComment(issue_number, issueMarker, body) {
              const comments = await github.paginate(github.rest.issues.listComments, {owner, repo, issue_number, per_page: 100});
              const prior = comments.find(comment => comment.body && comment.body.includes(issueMarker));
              if (prior) {
                await github.rest.issues.updateComment({owner, repo, comment_id: prior.id, body});
              } else {
                await github.rest.issues.createComment({owner, repo, issue_number, body});
              }
            }

            await upsertComment(pull_number, marker, certification);
            await upsertComment(19, `${marker}-issue-19`, `${marker}-issue-19\nPR #30 certified at \`${sha}\`.\n\n${table}\n\nFull gates: ${runUrl}`);
            const childEvidence = {
              13: 'Backend: FastAPI/OpenAPI/DDL/raw-SQL merge, API/flow/data/query/test views, five-framework corpus, deterministic drift gates.',
              14: 'Frontend: route/component/API/state/accessibility/token/responsive facts plus implementation and verification views.',
              15: 'Infrastructure: CloudFormation stack/resource/parameter/dependency/IAM/network/stateful/external/risk facts with secret-reference redaction.',
              16: 'Batch: job/trigger/ordered flow/effect/recovery/verification facts and generated views.',
            };
            for (const [number, evidence] of Object.entries(childEvidence)) {
              const issueNumber = Number(number);
              const childMarker = `${marker}-issue-${issueNumber}`;
              await upsertComment(issueNumber, childMarker, `${childMarker}\nPR #30 certified at \`${sha}\`. ${evidence}\n\nFull gates: ${runUrl}`);
            }

            const pr = await github.rest.pulls.get({owner, repo, pull_number});
            const acceptance = `\n\n${marker}\n### Certified acceptance\n\nCertified SHA: \`${sha}\` — ${runUrl}\n\n${table}`;
            const current = pr.data.body || '';
            const cleaned = current.includes(marker) ? current.slice(0, current.indexOf(marker)).trimEnd() : current.trimEnd();
            await github.rest.pulls.update({owner, repo, pull_number, body: `${cleaned}${acceptance}`});
            if (pr.data.draft) {
              await github.graphql(
                `mutation($id: ID!) { markPullRequestReadyForReview(input: {pullRequestId: $id}) { pullRequest { isDraft } } }`,
                {id: pr.data.node_id}
              );
            }
