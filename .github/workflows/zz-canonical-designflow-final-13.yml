name: Canonical Designflow Baseline Synchronization

on:
  push:
    branches: [agent/canonical-design-platform]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: canonical-designflow-baseline-synchronization
  cancel-in-progress: true

jobs:
  synchronize:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/canonical-design-platform
          fetch-depth: 0
      - name: Wait for semantic finalization and load its SHA
        shell: bash
        run: |
          sleep 660
          git fetch origin main agent/canonical-design-platform --no-tags
          git reset --hard origin/agent/canonical-design-platform
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install -r requirements.txt
          pip install "fastapi>=0.115,<1"
      - name: Assert semantic final tree is available
        shell: bash
        run: |
          test -f tools/designflow_platform.py
          grep -q 'SENSITIVE_KEY_PATTERN' tools/designflow_platform.py
          grep -q 'REQUIRED_CAPABILITY_NOT_APPLICABLE' tools/designflow_platform.py
          grep -q 'seen_system_link_ids' tools/designflow_platform.py
          grep -q 'infra.external-reference' tools/designflow_platform.py
          test ! -d .github/bootstrap
          test ! -e .canonical-final-tree
      - name: Synchronize byte-for-byte compatibility baselines
        shell: python
        run: |
          from __future__ import annotations

          import filecmp
          import shutil
          from pathlib import Path

          root = Path.cwd().resolve()
          for path in (root / '.github/workflows').glob('*'):
              if path.is_file() and (
                  path.name.startswith('canonical-designflow-repair')
                  or path.name.startswith('zz-canonical-designflow-final')
              ):
                  path.unlink()
          pairs = (
              (
                  root / 'tests/fixtures/designflow/phase1/docs/design/generated/orders-backend',
                  root / 'tests/fixtures/designflow/baselines/fastapi-openapi-sql',
              ),
              (
                  root / 'tests/fixtures/designflow/profiles/infrastructure/docs/design/generated/infra',
                  root / 'tests/fixtures/designflow/baselines/cloudformation',
              ),
          )
          for source, target in pairs:
              if target.exists():
                  shutil.rmtree(target)
              shutil.copytree(source, target)
              comparison = filecmp.dircmp(source, target)
              if comparison.left_only or comparison.right_only or comparison.diff_files or comparison.funny_files:
                  raise RuntimeError(f'baseline mismatch: {source} -> {target}')
              for source_path in sorted(path for path in source.rglob('*') if path.is_file()):
                  relative = source_path.relative_to(source)
                  if source_path.read_bytes() != (target / relative).read_bytes():
                      raise RuntimeError(f'baseline byte mismatch: {relative}')
      - name: Amend the single feature commit
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit --amend --no-edit
          test "$(git rev-list --count origin/main..HEAD)" -eq 1
      - name: Re-run complete certification with synchronized baselines
        shell: bash
        run: |
          set -o pipefail
          python tools/devflow.py catalog --check
          python .agents/skills/maintain-canonical-requirements/scripts/specflow.py check
          python .agents/skills/verify-against-engineering-standards/scripts/standardsflow.py check
          ruff check .
          python governance/reviews/validate.py --root . --commit HEAD
          python .agents/skills/generate-implementation-design/scripts/designflow.py --root . conformance --real-toolchain --json
          python -m unittest discover -s tests
          python tools/validate_repo.py
          python tools/devflow.py audit
          test -z "$(git status --porcelain)"
      - name: Force-update synchronized branch
        run: git push --force origin HEAD:refs/heads/agent/canonical-design-platform
